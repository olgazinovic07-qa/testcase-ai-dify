            2. The response must contain ONLY clean, pure JSON code.

            3. Do NOT add any markdown formatting, do NOT use code blocks like ```json
            ... ```, and do NOT include conversational words like "Here is your JSON".
            Return ONLY the raw valid JSON object text.

            '
