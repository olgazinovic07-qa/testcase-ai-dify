            List of test cases for conversion: {{text}}


            Mandatory JSON structure you must return:

            { "test_cases": [ { "id": "string with ID", "title": "string with title",
            "preconditions": [ "precondition 1", "precondition 2" ], "steps": [ "step
            1", "step 2" ], "expected_result": "string with expected result" } ] }


            Important rules:

            1. If there are no preconditions, leave the "preconditions" array empty
