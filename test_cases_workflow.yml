          \        cleaned = cleaned[3:]\n        \n    if cleaned.endswith(\"```\"\
          ):\n        cleaned = cleaned[:-3]\n    cleaned = cleaned.strip()\n\n  \
          \  try:\n        # Проверяем, что это корректный JSON-синтаксис\n      \
          \  parsed = json.loads(cleaned)\n        \n        # Проверяем наличие обязательного\
          \ корневого ключа по ТЗ\n        if isinstance(parsed, dict) and \"test_cases\"\
          \ in parsed:\n            return {\n                \"status\": \"valid\"\
          , \n                \"result\": json.dumps(parsed, ensure_ascii=False, indent=2)\n\
          \            }\n        else:\n            return {\n                \"\
          status\": \"invalid\", \n                \"result\": \"Ошибка структуры:\
          \ Отсутствует корневой ключ 'test_cases'\"\n            }\n            \n\
          \    except Exception as e:\n        return {\n            \"status\": \"\
          invalid\", \n            \"result\": f\"Ошибка синтаксиса JSON: {str(e)}\"\
          \n        }"
